<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 포트폴리오 빌더</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#6366f1;--primary-light:#e0e7ff;
  --bg:#f8fafc;--card:#fff;--text:#1e293b;
  --muted:#64748b;--border:#e2e8f0;
  --danger:#ef4444;--py:#3b82f6;--py-light:#dbeafe;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* hljs - 흰 바탕 테마 */
.hljs{background:#f8fafc;color:#24292e;padding:14px!important;border-radius:0;font-family:'Courier New',monospace;font-size:.85rem;line-height:1.6;}
.hljs-comment,.hljs-quote{color:#6a737d;font-style:italic}
.hljs-keyword,.hljs-selector-tag{color:#d73a49;font-weight:600}
.hljs-string,.hljs-addition{color:#032f62}
.hljs-number,.hljs-literal{color:#005cc5}
.hljs-built_in,.hljs-title.class_{color:#6f42c1}
.hljs-title,.hljs-function{color:#6f42c1;font-weight:600}
.hljs-variable,.hljs-attr{color:#e36209}
.hljs-operator{color:#d73a49}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:rgba(99,102,241,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;}
#loadingScreen .spin{width:48px;height:48px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{font-size:1rem;font-weight:600;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.login-box .logo{font-size:2.6rem;margin-bottom:8px;}
.login-box h1{font-size:1.3rem;font-weight:800;margin-bottom:4px;}
.login-box>p{font-size:.82rem;color:var(--muted);margin-bottom:28px;}
.login-field{text-align:left;margin-bottom:14px;}
.login-field label{font-size:.78rem;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
.login-field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;transition:border .2s;}
.login-field input:focus{outline:none;border-color:var(--primary);}
.login-err{color:var(--danger);font-size:.8rem;margin-bottom:10px;min-height:18px;}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.login-hint{margin-top:16px;font-size:.75rem;color:var(--muted);}

/* HEADER */
header{background:linear-gradient(135deg,var(--primary),#8b5cf6);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(99,102,241,.3);flex-wrap:wrap;gap:8px;}
header h1{font-size:1.15rem;font-weight:700;}
header p{font-size:.78rem;opacity:.85;margin-top:2px;}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.user-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:.8rem;font-weight:600;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s;}
.btn-white{background:#fff;color:var(--primary);}.btn-white:hover{background:#ede9fe;}
.btn-outline{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);}.btn-outline:hover{background:rgba(255,255,255,.25);}

#appScreen{display:none;}
.container{max-width:960px;margin:0 auto;padding:24px 16px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--border);}
.stat-num{font-size:2rem;font-weight:700;color:var(--primary);}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:2px;}

/* ADD TYPE */
.add-type-bar{display:flex;gap:10px;margin-bottom:24px;}
.add-type-btn{flex:1;padding:14px;border-radius:14px;border:2px solid var(--border);background:var(--card);cursor:pointer;text-align:center;transition:all .2s;font-size:.88rem;font-weight:600;color:var(--muted);}
.add-type-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.add-type-btn.active-text{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
.add-type-btn.active-py{border-color:var(--py);background:var(--py-light);color:var(--py);}
.add-type-btn .icon{font-size:1.5rem;display:block;margin-bottom:4px;}

/* FORMS */
.add-form{background:var(--card);border-radius:16px;padding:22px;margin-bottom:24px;border:1px solid var(--border);}
.add-form h2{font-size:.95rem;font-weight:700;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-group label{font-size:.76rem;font-weight:600;color:var(--muted);}
.form-group input,.form-group textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.86rem;color:var(--text);background:var(--bg);font-family:inherit;transition:border .2s;}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);background:#fff;}
.form-group textarea{resize:vertical;min-height:375px;}
.image-upload-area{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;position:relative;background:var(--bg);transition:all .2s;}
.image-upload-area:hover{border-color:var(--primary);background:var(--primary-light);}
.image-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.image-upload-area p{font-size:.8rem;color:var(--muted);}
.image-preview-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.image-preview-item{position:relative;}
.image-preview-item img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.img-del{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:9px;cursor:pointer;}
.form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}
.btn-primary{background:var(--primary);color:#fff;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;}
.btn-primary:hover{background:#4f46e5;}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.btn-py-primary{background:var(--py);color:#fff;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;}
.btn-secondary{background:var(--bg);color:var(--muted);padding:9px 16px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:.85rem;font-weight:600;}

/* PYTHON */
.py-editor-wrap{border-radius:10px;overflow:hidden;border:1.5px solid var(--py);margin-bottom:12px;}
.py-editor-header{background:#eff6ff;padding:8px 14px;border-bottom:1px solid #bfdbfe;}
.py-editor-header span{color:var(--py);font-size:.78rem;font-family:monospace;font-weight:600;}
#pyCodeInput{width:100%;min-height:160px;padding:14px;background:#fff;color:#24292e;font-family:'Courier New',monospace;font-size:.88rem;border:none;resize:vertical;outline:none;line-height:1.8;}

/* FILTER */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-bar span{font-size:.8rem;color:var(--muted);font-weight:600;}
.filter-btn{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:.78rem;cursor:pointer;transition:all .2s;}
.filter-btn.active,.filter-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}

/* RECORDS */
.records{display:grid;gap:12px;}
.record-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.03);}
.record-card.py-card{border-left:3px solid var(--py);}
.record-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.record-meta{display:flex;gap:7px;flex-wrap:wrap;}
.badge{padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600;}
.badge-subject{background:var(--primary-light);color:var(--primary);}
.badge-date{background:#f1f5f9;color:var(--muted);}
.badge-py{background:var(--py-light);color:var(--py);}
.btn-icon{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:.78rem;color:var(--muted);}
.btn-icon:hover{background:var(--danger);color:#fff;border-color:var(--danger);}
.record-title{font-size:.97rem;font-weight:700;margin-bottom:5px;}
.record-content{font-size:.85rem;color:var(--muted);line-height:1.6;white-space:pre-wrap;}
.record-images{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.record-images img{width:88px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .2s;}
.record-images img:hover{transform:scale(1.05);}
.saved-code-wrap{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.saved-code-header{background:#f1f5f9;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.saved-code-header span{color:var(--muted);font-size:.75rem;font-family:monospace;}
.saved-code-header button{background:var(--primary-light);color:var(--primary);border:none;border-radius:5px;padding:3px 10px;font-size:.72rem;cursor:pointer;font-weight:600;}
.saved-code-header button:hover{background:var(--primary);color:#fff;}
.saved-code-wrap pre{margin:0!important;border-radius:0!important;background:#f8fafc!important;overflow-x:auto;}
.saved-code-wrap code{font-size:.85rem!important;font-family:'Courier New',monospace!important;white-space:pre-wrap;word-break:break-all;display:block;line-height:2;}

@media print{
  .saved-code-wrap pre{overflow:visible!important;}
  .saved-code-wrap code{white-space:pre-wrap!important;word-break:break-word!important;}
}
.saved-output{background:#f0fdf4;padding:8px 12px;font-family:'Courier New',monospace;font-size:.82rem;color:#166534;white-space:pre-wrap;border-top:1px solid #bbf7d0;}
.saved-output.err{background:#fef2f2;color:#991b1b;border-top:1px solid #fecaca;}

/* MASTER */
.master-tabs{display:flex;gap:8px;margin-bottom:20px;}
.master-tab{padding:8px 20px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;}
.master-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.subject-card{background:#fff;border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;}
.subject-card-header{background:var(--primary-light);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.subject-card-header h3{font-size:.95rem;font-weight:700;color:var(--primary);}
.subject-card-body{padding:14px 18px;}
.chip{display:inline-block;padding:4px 12px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-size:.78rem;font-weight:600;margin:2px;cursor:pointer;transition:all .2s;}
.chip:hover{background:var(--danger);color:#fff;border-color:var(--danger);}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-box h3{font-size:1rem;font-weight:700;margin-bottom:16px;}
.student-select-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-height:260px;overflow-y:auto;margin-bottom:14px;}
.sel-btn{padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s;}
.sel-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary);}
.portfolio-modal-box{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:700px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .icon{font-size:2.8rem;margin-bottom:10px;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:10px;}
.lightbox-close{position:absolute;top:20px;right:28px;color:#fff;font-size:2rem;cursor:pointer;}

/* PRINT */
@media print{
  #loginScreen,#loadingScreen{display:none!important;}
  #appScreen{display:block!important;}
  header{background:#6366f1!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .header-right,.add-type-bar,.add-form,.filter-bar,.btn-icon,.py-run-btn,#masterUI{display:none!important;}
  body{background:#fff!important;}
  .record-card{break-inside:avoid;box-shadow:none!important;border:1px solid #ddd!important;margin-bottom:14px;}
}
@media(max-width:600px){.add-type-bar{flex-direction:column;}}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen">
  <div class="spin"></div>
  <p>Firebase 연결 중...</p>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="logo">📚</div>
    <h1>학습 포트폴리오</h1>
    <p>학번과 비밀번호를 입력해 주세요</p>
    <div class="login-field"><label>🎓 학번</label>
      <input type="text" id="inputId" placeholder="예) 3102" maxlength="6" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="login-field"><label>🔒 비밀번호</label>
      <input type="password" id="inputPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn" onclick="login()">로그인</button>
    <p class="login-hint">초기 비밀번호는 학번과 동일합니다</p>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div><h1>📚 학습 포트폴리오 빌더</h1><p id="headerSub"></p></div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="btn btn-white" id="btnChangePw" style="display:none" onclick="openModal('pwModal')">🔑 비밀번호 변경</button>
      <button class="btn btn-outline" id="btnPrint" style="display:none" onclick="window.print()">🖨️ PDF 출력</button>
      <button class="btn btn-outline" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <!-- 학생 UI -->
    <div id="studentUI" style="display:none">
      <div class="stats">
        <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">총 학습 기록</div></div>
        <div class="stat-card"><div class="stat-num" id="statSubjects">0</div><div class="stat-label">기록 유형</div></div>
        <div class="stat-card"><div class="stat-num" id="statPy">0</div><div class="stat-label">파이썬 코드</div></div>
      </div>
      <div class="add-type-bar">
        <button class="add-type-btn" id="btnAddText" onclick="showForm('text')"><span class="icon">📝</span>글 내용 추가하기</button>
        <button class="add-type-btn" id="btnAddPy" onclick="showForm('python')"><span class="icon">🐍</span>파이썬 코드 추가하기</button>
      </div>
      <!-- 글 폼 -->
      <div class="add-form" id="textForm" style="display:none">
        <h2 style="color:var(--primary)">📝 글 내용 추가</h2>
        <div class="form-group"><label>📅 수업 날짜</label><input type="date" id="tDate"></div>
        <div class="form-group"><label>📝 수업 제목</label><input type="text" id="tTitle" placeholder="예) 오늘 배운 핵심 내용"></div>
        <div class="form-group"><label>💡 학습 내용</label><textarea id="tContent" placeholder="오늘 배운 내용, 핵심 개념, 느낀 점..."></textarea></div>
        <div class="form-group">
          <label>🖼️ 이미지 첨부</label>
          <div class="image-upload-area">
            <input type="file" accept="image/*" multiple onchange="handleImg(event)">
            <p>📎 클릭하거나 이미지를 드래그해서 첨부</p>
            <p style="font-size:.73rem;margin-top:3px">JPG, PNG 등 여러 장 가능</p>
          </div>
          <div class="image-preview-wrap" id="imgPreview"></div>
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="clearTextForm()">초기화</button>
          <button class="btn-primary" id="btnSaveText" onclick="saveText()">💾 저장하기</button>
        </div>
      </div>
      <!-- 파이썬 폼 -->
      <div class="add-form" id="pyForm" style="display:none">
        <h2 style="color:var(--py)">🐍 파이썬 코드 추가</h2>
        <div class="form-group"><label>📅 수업 날짜</label><input type="date" id="pDate"></div>
        <div class="form-group"><label>📝 코드 제목</label><input type="text" id="pTitle" placeholder="예) 반복문 연습, 리스트 정렬..."></div>
        <div class="form-group"><label>💡 코드 설명</label><textarea id="pDesc" placeholder="이 코드가 무엇을 하는지 설명해 주세요..." style="min-height:80px"></textarea></div>
        <label style="font-size:.76rem;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;">🐍 파이썬 코드</label>
        <div class="py-editor-wrap">
          <div class="py-editor-header"><span>🐍 Python</span></div>
          <textarea id="pyCodeInput" spellcheck="false" placeholder="# 파이썬 코드를 여기에 붙여넣기 하세요&#10;print('Hello, World!')"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="clearPyForm()">초기화</button>
          <button class="btn-py-primary" id="btnSavePy" onclick="savePython()">💾 코드 저장하기</button>
        </div>
      </div>
      <div class="filter-bar">
        <span>필터:</span>
        <button class="filter-btn active" onclick="setFilter('전체',this)">전체</button>
        <button class="filter-btn" onclick="setFilter('__py__',this)">🐍 파이썬만</button>
      </div>
      <div class="records" id="recordList"></div>
      <div class="empty" id="emptyState" style="display:none"><div class="icon">📖</div><p>아직 학습 기록이 없어요.</p></div>
    </div>

    <!-- 마스터 UI -->
    <div id="masterUI" style="display:none">
      <div class="master-tabs">
        <button class="master-tab active" id="tabStudents" onclick="switchMasterTab('students')">🎓 학번별 관리</button>
        <button class="master-tab" id="tabSubjects" onclick="switchMasterTab('subjects')">📚 과목별 관리</button>
      </div>
      <div id="masterStudents">
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
          <button class="btn-primary" onclick="openModal('addStudentModal')">+ 학번 추가</button>
        </div>
        <div id="masterList" style="display:grid;gap:10px;"></div>
      </div>
      <div id="masterSubjects" style="display:none">
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
          <button class="btn-primary" onclick="openModal('addSubjectModal')">+ 과목 추가</button>
        </div>
        <div id="subjectCards"></div>
        <div id="subjectEmpty" style="display:none;text-align:center;padding:40px;color:var(--muted);">
          <div style="font-size:2.5rem;margin-bottom:10px;">📚</div><p>아직 과목이 없어요.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="pwModal">
  <div class="modal-box">
    <h3>🔑 비밀번호 변경</h3>
    <div class="form-group"><label>현재 비밀번호</label><input type="password" id="pwCurrent"></div>
    <div class="form-group"><label>새 비밀번호</label><input type="password" id="pwNew" placeholder="4자리 이상"></div>

function handleImg(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const max=800; let w=img.width,h=img.height;
        if(w>max){h=h*(max/w);w=max;} if(h>max){w=w*(max/h);h=max;}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        pendingImages.push({dataUrl:canvas.toDataURL('image/jpeg',0.7),name:f.name});
        renderPending();

      img.src=ev.target.result;

    r.readAsDataURL(f);
  }); e.target.value='';
}

// ── 파이썬 ──
function runCode(){
  const code=document.getElementById('pyCodeInput').value;
  const out=document.getElementById('pyOutput');
  out.className=''; out.textContent='실행 중...';
  try{
    const output=[];
    pySimulate(code,(...a)=>output.push(a.map(String).join(' ')));
    out.className='success';
    out.textContent=output.length?output.join('\n'):'(출력 없음)';
  }catch(e){out.className='error';out.textContent='❌ 오류: '+e.message;}
}
function pySimulate(code, log) {
  const lines = code.split('\n');
  const result = [];
  const indentStack = [0];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trimStart();
    if (!trimmed || trimmed.startsWith('#')) continue;

    const indent = line.length - trimmed.length;
    const prevIndent = indentStack[indentStack.length - 1];

    // 들여쓰기 감소 → 블록 닫기
    if (indent < prevIndent) {
      while (indentStack[indentStack.length - 1] > indent) {
        indentStack.pop();
        result.push('}');
      }
    }

    // 파이썬 → JS 변환
    let js = trimmed
      .replace(/True/g, 'true').replace(/False/g, 'false').replace(/None/g, 'null')
      .replace(/and\b/g, '&&').replace(/\bor\b/g, '||').replace(/\bnot\b/g, '!')
      .replace(/\*\*/g, '**')
      .replace(/print\((.+)\)/g, (_, a) => `__log(${a})`);

    // 블록 문 처리
    const forRange2 = js.match(/^for\s+(\w+)\s+in\s+range\((.+),\s*(.+)\):/);
    const forRange1 = js.match(/^for\s+(\w+)\s+in\s+range\((.+)\):/);
    const forIn    = js.match(/^for\s+(\w+)\s+in\s+(.+):/);
    const whileM   = js.match(/^while\s+(.+):/);
    const ifM      = js.match(/^if\s+(.+):/);
    const elifM    = js.match(/^elif\s+(.+):/);
    const elseM    = /^else\s*:/.test(js);
    const defM     = js.match(/^def\s+(\w+)\s*\((.*)\)\s*:/);

    let converted = '';
    let isBlock = false;

    if (defM) {
      converted = `function ${defM[1]}(${defM[2]}) {`;
      isBlock = true;
    } else if (forRange2) {
      converted = `for (let ${forRange2[1]} = ${forRange2[2].trim()}; ${forRange2[1]} < ${forRange2[3].trim()}; ${forRange2[1]}++) {`;
      isBlock = true;
    } else if (forRange1) {
      converted = `for (let ${forRange1[1]} = 0; ${forRange1[1]} < ${forRange1[2].trim()}; ${forRange1[1]}++) {`;
      isBlock = true;
    } else if (forIn) {
      converted = `for (let ${forIn[1]} of ${forIn[2].trim()}) {`;
      isBlock = true;
    } else if (whileM) {
      converted = `while (${whileM[1].trim()}) {`;
      isBlock = true;
    } else if (ifM) {
      converted = `if (${ifM[1].trim()}) {`;
      isBlock = true;
    } else if (elifM) {
      result.push('} else if (' + elifM[1].trim() + ') {');
      indentStack.push(indent + 1);
      continue;
    } else if (elseM) {
      result.push('} else {');
      indentStack.push(indent + 1);
      continue;
    } else {
      // 일반 구문: 변수 선언 처리
      converted = js
        .replace(/^(\w+)\s*=\s*(.+)$/, (m, v, val) => {
          const declared = result.some(r => r.includes(`let ${v}`) || r.includes(`var ${v}`));
          return declared ? `${v} = ${val}` : `let ${v} = ${val}`;
        });
    }

    result.push(converted);

    if (isBlock) {
      indentStack.push(indent + 1);
    }
  }

  // 남은 블록 닫기
  while (indentStack.length > 1) {
    indentStack.pop();
    result.push('}');
  }

  const finalCode = result.join('\n');
  try {
    new Function('__log', finalCode)(log);
  } catch(e) {
    throw new Error(e.message + '\n\n[변환된 코드]\n' + finalCode);
  }
}

  showLoading(false);
  currentUser=id; currentFilter='전체';
  document.getElementById('masterUI').style.display='none';
  document.getElementById('studentUI').style.display='block';
  document.getElementById('userBadge').textContent=`👑 마스터 보기: ${id} · ${STUDENTS[id].name}`;
  document.getElementById('headerSub').textContent=`${STUDENTS[id].name}의 포트폴리오 (읽기 전용)`;
  document.getElementById('btnChangePw').style.display='none';
  document.getElementById('btnPrint').style.display='none';
  document.querySelector('.add-type-bar').style.display='none';
  hideAllForms();
  const existing=document.getElementById('backToMaster');
  if(!existing){
    document.getElementById('studentUI').insertAdjacentHTML('afterbegin',
      `<button id="backToMaster" class="btn-secondary" style="margin-bottom:16px;" onclick="backMaster()">← 전체 목록으로</button>`);
  }
  render();
}
function backMaster(){
  const b=document.getElementById('backToMaster');if(b)b.remove();
  currentUser='MASTER';
  document.getElementById('studentUI').style.display='none';
  document.getElementById('masterUI').style.display='block';
  document.querySelector('.add-type-bar').style.display='flex';
  document.getElementById('userBadge').textContent='👑 마스터 계정';
  document.getElementById('headerSub').textContent='전체 학생 포트폴리오 관리';
  renderMasterStudents();
}
async function masterResetPw(id){
  if(!confirm(`${id} · ${STUDENTS[id].name}의 비밀번호를 학번(${id})으로 초기화할까요?`))return;
  STUDENTS[id].pw=id;
  await setDoc(doc(db,'students',id),STUDENTS[id]);
  alert(`✅ ${id}번 비밀번호가 초기화됐어요.`);
}
window.switchMasterTab=switchMasterTab; window.masterViewStudent=masterViewStudent;
window.backMaster=backMaster; window.masterResetPw=masterResetPw;

// ── 학번 추가 ──
async function doAddStudent(){
  const id=document.getElementById('newStudentId').value.trim();
  const name=document.getElementById('newStudentName').value.trim();
  const pw=document.getElementById('newStudentPw').value.trim();
  const err=document.getElementById('addStudentErr');
  if(!id){err.textContent='학번을 입력해 주세요.';return;}
  if(STUDENTS[id]){err.textContent='이미 존재하는 학번입니다.';return;}
  const btn=document.getElementById('btnAddStudentOk');
  btn.disabled=true; btn.textContent='추가 중...';
  try{
    const data={pw:pw||id, name:name||`${id}번`, role:'student'};
    await setDoc(doc(db,'students',id),data);
    STUDENTS[id]=data; portfolios[id]=[];
    closeModal('addStudentModal');
    document.getElementById('newStudentId').value='';
    document.getElementById('newStudentName').value='';
    document.getElementById('newStudentPw').value='';
    err.textContent='';
    renderMasterStudents();
    alert(`✅ 학번 ${id} (${data.name}) 이 추가됐어요!`);
  }catch(e){err.textContent='오류: '+e.message;}
  btn.disabled=false; btn.textContent='추가하기';
}
window.doAddStudent=doAddStudent;

// ── 과목 ──
async function doAddSubject(){
  const name=document.getElementById('newSubjectName').value.trim();
  const err=document.getElementById('addSubjectErr');
  if(!name){err.textContent='과목명을 입력해 주세요.';return;}
  if(subjectMap[name]){err.textContent='이미 존재하는 과목명입니다.';return;}
  await setDoc(doc(db,'subjects',name),{members:[]});
  subjectMap[name]=[];
  closeModal('addSubjectModal');
  document.getElementById('newSubjectName').value='';
  renderSubjectCards();
}
function openAssign(subjectName){
  assigningSubject=subjectName;
  assignTempSelected=[...(subjectMap[subjectName]||[])];
  document.getElementById('assignModalTitle').textContent=`📋 "${subjectName}" 학생 배정`;
  const ids=Object.keys(STUDENTS).filter(id=>id!=='MASTER'&&id!=='1111');
  document.getElementById('studentSelectGrid').innerHTML=ids.map(id=>
    `<button class="sel-btn ${assignTempSelected.includes(id)?'selected':''}" onclick="toggleAssign('${id}',this)">${id}</button>`
  ).join('');
  openModal('assignModal');
}
function toggleAssign(id,el){
  const idx=assignTempSelected.indexOf(id);
  if(idx===-1){assignTempSelected.push(id);el.classList.add('selected');}
  else{assignTempSelected.splice(idx,1);el.classList.remove('selected');}
}
async function doAssign(){
  subjectMap[assigningSubject]=[...assignTempSelected];
  await setDoc(doc(db,'subjects',assigningSubject),{members:subjectMap[assigningSubject]});
  closeModal('assignModal'); renderSubjectCards();
}
function renderSubjectCards(){
  const keys=Object.keys(subjectMap);
  document.getElementById('subjectEmpty').style.display=keys.length?'none':'block';
  document.getElementById('subjectCards').innerHTML=keys.map(name=>{
    const ids=subjectMap[name];
    const chips=ids.length?ids.map(id=>`<span class="chip" onclick="removeFromSubject('${name}','${id}')">${id} ✕</span>`).join('')
      :'<span style="font-size:.8rem;color:var(--muted);">배정된 학생 없음</span>';
    return `<div class="subject-card">
      <div class="subject-card-header">
        <h3>📚 ${name} <span style="font-size:.78rem;font-weight:400;">(${ids.length}명)</span></h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn-secondary" style="font-size:.76rem;padding:5px 12px;" onclick="openAssign('${name}')">👤 학생 배정</button>
          <button class="btn-secondary" style="font-size:.76rem;padding:5px 12px;" onclick="viewSubjectPortfolio('${name}')">📂 포트폴리오 보기</button>
          <button class="btn-icon" onclick="deleteSubject('${name}')">🗑️</button>
        </div>
      </div>
      <div class="subject-card-body"><div>${chips}</div></div>
    </div>`;
  }).join('');
}
async function removeFromSubject(name,id){
  subjectMap[name]=subjectMap[name].filter(s=>s!==id);
  await setDoc(doc(db,'subjects',name),{members:subjectMap[name]});
  renderSubjectCards();
}
async function deleteSubject(name){
  if(!confirm(`"${name}" 과목을 삭제할까요?`))return;
  await deleteDoc(doc(db,'subjects',name));
  delete subjectMap[name]; renderSubjectCards();
}
async function viewSubjectPortfolio(name){
  const ids=subjectMap[name];
  document.getElementById('subjectPortfolioTitle').textContent=`📚 ${name} — 과목 포트폴리오`;
  const content=document.getElementById('subjectPortfolioContent');
  content.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;">불러오는 중...</p>';
  openModal('subjectPortfolioModal');
  for(const id of ids) await loadPortfolio(id);
  if(!ids.length){content.innerHTML='<p style="color:var(--muted);text-align:center;padding:20px;">배정된 학생이 없어요.</p>';}
  else{
    content.innerHTML=ids.map(id=>{
      const recs=portfolios[id]||[];
      const cards=recs.length?recs.map(r=>r.type==='python'?renderPyCard(r):renderTextCard(r)).join('')
        :`<p style="color:var(--muted);font-size:.85rem;padding:8px 0;">기록 없음</p>`;
      return `<div style="margin-bottom:20px;">
        <div style="font-weight:700;font-size:.9rem;color:var(--primary);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--primary-light);">
          🎓 ${id} · ${STUDENTS[id]?.name||''} <span style="font-weight:400;color:var(--muted);font-size:.78rem;">— ${recs.length}개 기록</span>
        </div>${cards}</div>`;
    }).join('');
    setTimeout(()=>document.querySelectorAll('#subjectPortfolioContent pre code').forEach(el=>hljs.highlightElement(el)),100);
  }
}
window.doAddSubject=doAddSubject; window.openAssign=openAssign; window.toggleAssign=toggleAssign;
window.doAssign=doAssign; window.removeFromSubject=removeFromSubject;
window.deleteSubject=deleteSubject; window.viewSubjectPortfolio=viewSubjectPortfolio;

// ── 비밀번호 변경 ──
async function doChangePw(){
  const cur=document.getElementById('pwCurrent').value;
  const nw=document.getElementById('pwNew').value;
  const cf=document.getElementById('pwConfirm').value;
  const err=document.getElementById('pwErr');
  if(STUDENTS[currentUser].pw!==cur){err.textContent='현재 비밀번호가 맞지 않습니다.';return;}
  if(!nw||nw.length<4){err.textContent='새 비밀번호는 4자리 이상이어야 합니다.';return;}
  if(nw!==cf){err.textContent='새 비밀번호가 일치하지 않습니다.';return;}
  STUDENTS[currentUser].pw=nw;
  await setDoc(doc(db,'students',currentUser),STUDENTS[currentUser]);
  closeModal('pwModal'); alert('✅ 비밀번호가 변경됐어요!');
}
window.doChangePw=doChangePw;

// ── 유틸 ──
function fmtDate(d){const dt=new Date(d);return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
window.openLightbox=openLightbox; window.closeLightbox=closeLightbox;

init();
</script>
</body>
</html>
